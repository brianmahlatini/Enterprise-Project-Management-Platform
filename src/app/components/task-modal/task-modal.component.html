<div class="modal">
  <div class="modal-header">
    <h2>Task details</h2>
    <button (click)="close()">Close</button>
  </div>

  <label>
    Title
    <input [(ngModel)]="card.title" />
  </label>

  <label>
    Description
    <textarea [(ngModel)]="card.description" rows="4"></textarea>
  </label>

  <label>
    Priority
    <select [(ngModel)]="card.priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="urgent">Urgent</option>
    </select>
  </label>

  <div class="meta">
    <div>
      <strong>Assignees</strong>
      <div class="avatar-row">
        <span
          *ngFor="let member of members().filter(m => card.assigneeIds.includes(m.id))"
          [style.background]="member.avatarColor"
        >
          {{ member.initials }}
        </span>
      </div>
    </div>
    <div>
      <strong>Labels</strong>
      <div class="chips">
        <span *ngFor="let label of card.labels">{{ label }}</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Comments</h3>
    <div class="comment" *ngFor="let comment of comments().filter(c => c.cardId === card.id)">
      <p>{{ comment.content }}</p>
      <small>{{ comment.createdAt | date:'short' }}</small>
    </div>
    <textarea [(ngModel)]="newComment" rows="2" placeholder="Write a comment..."></textarea>
    <button (click)="addComment()">Add Comment</button>
  </div>

  <div class="section">
    <h3>Activity Timeline</h3>
    <div class="activity" *ngFor="let activity of activities().filter(a => a.cardId === card.id)">
      <p>{{ activity.message }}</p>
      <small>{{ activity.createdAt | date:'short' }}</small>
    </div>
  </div>

  <div class="actions">
    <button class="primary" (click)="save()">Save changes</button>
    <button (click)="close()">Cancel</button>
  </div>
</div>
